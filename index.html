<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="css/style.css"><link rel="manifest" href="manifest.json"><title>3CTS</title></head><body><header><div class="wrap"><h1>3-Cushion Training System</h1><div class="sub">Dashboard</div></div></header><nav><div class="nav"><a class="active" href="index.html">首頁</a><a href="game.html">新局</a><a href="history.html">歷史</a><a href="analytics.html">分析</a><a href="settings.html">設定</a></div></nav><main><section class="card"><a class="btn" href="game.html">開始新局</a></section><section class="card"><h2>總覽</h2><div class="metrics"><div class="metric"><div class="ml">總局數</div><div class="mv" id="g">0</div></div><div class="metric"><div class="ml">總 AVG</div><div class="mv" id="a">0.000</div></div><div class="metric"><div class="ml">High Run</div><div class="mv" id="h">0</div></div><div class="metric"><div class="ml">平均時間</div><div class="mv" id="d">00:00</div></div></div></section></main><script src="js/common.js"></script><script>const x=loadHistory(),p=x.reduce((s,v)=>s+Number(v.totalPoints||0),0),n=x.reduce((s,v)=>s+Number(v.totalShots||0),0),td=x.filter(v=>v.durationSeconds!=null);g.textContent=x.length;a.textContent=(n?p/n:0).toFixed(3);h.textContent=x.length?Math.max(...x.map(v=>Number(v.highRun||0))):0;d.textContent=duration(td.length?td.reduce((s,v)=>s+v.durationSeconds,0)/td.length:0)</script></body></html>
