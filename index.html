<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>3-Cushion Training System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f766e" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header><div class="header-inner"><h1>3-Cushion Training System</h1><div class="subtitle">Dashboard｜訓練總覽</div></div></header>
  <nav><div class="nav-inner">
    <a class="active" href="index.html">首頁</a>
    <a href="game.html">新局</a>
    <a href="history.html">歷史</a>
    <a href="analytics.html">分析</a>
    <a href="settings.html">設定</a>
  </div></nav>
  <main>
    <section class="card">
      <h2>快速操作</h2>
      <div class="actions">
        <a class="button-link" href="game.html">開始新局</a>
        <a class="button-link light" href="analytics.html">查看分析</a>
      </div>
    </section>

    <section class="card">
      <h2>總覽統計</h2>
      <div class="metric-grid">
        <div class="metric"><div class="metric-label">總局數</div><div class="metric-value" id="totalGames">0</div></div>
        <div class="metric"><div class="metric-label">總 AVG</div><div class="metric-value" id="overallAvg">0.000</div></div>
        <div class="metric"><div class="metric-label">最近 10 局 AVG</div><div class="metric-value" id="recent10Avg">0.000</div></div>
        <div class="metric"><div class="metric-label">High Run</div><div class="metric-value" id="highRun">0</div></div>
      </div>
    </section>

    <section class="card">
      <h2>近 20 局 AVG 趨勢</h2>
      <div class="chart-box"><canvas id="avgChart"></canvas></div>
      <p class="note">若尚未有歷史紀錄，圖表會暫時空白。</p>
    </section>

    <section class="card">
      <h2>最近 5 局</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>日期</th><th>地點</th><th>得分</th><th>杆數</th><th>AVG</th></tr></thead>
          <tbody id="recentTable"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="js/common.js"></script>
  <script>
    const history = loadHistory();
    const stats = calculateHistoryStats(history);
    document.getElementById("totalGames").textContent = stats.totalGames;
    document.getElementById("overallAvg").textContent = stats.avg.toFixed(3);
    document.getElementById("recent10Avg").textContent = stats.recent10Avg.toFixed(3);
    document.getElementById("highRun").textContent = stats.highRun;

    const recentTable = document.getElementById("recentTable");
    if (history.length === 0) {
      recentTable.innerHTML = '<tr><td colspan="6">尚無歷史紀錄</td></tr>';
    } else {
      history.slice(-5).reverse().forEach((game, idx) => {
        const number = history.length - idx;
        recentTable.innerHTML += `<tr><td>${number}</td><td>${escapeHTML(game.date || "")}</td><td>${escapeHTML(game.venue || "")}</td><td>${game.totalPoints || 0}</td><td>${game.totalShots || 0}</td><td>${Number(game.avg || 0).toFixed(3)}</td></tr>`;
      });
    }

    const last20 = history.slice(-20);
    new Chart(document.getElementById("avgChart"), {
      type: "line",
      data: {
        labels: last20.map((_, i) => String(history.length - last20.length + i + 1)),
        datasets: [{
          label: "AVG",
          data: last20.map(g => Number(g.avg || 0)),
          tension: 0.25
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { y: { beginAtZero: true } }
      }
    });
  </script>
</body>
</html>
