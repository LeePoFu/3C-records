<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>即時計分｜3CTS</title><link rel="stylesheet" href="css/style.css"><link rel="manifest" href="manifest.json"></head><body>
<header><div class="wrap"><h1>開始新局</h1><div class="sub">目標得分、即時計分與完成時間</div></div></header>
<nav><div class="nav"><a href="index.html">首頁</a><a class="active" href="game.html">新局</a><a href="history.html">歷史</a><a href="analytics.html">分析</a><a href="settings.html">設定</a></div></nav>
<main>
<section class="card" id="setup"><h2>本局設定</h2><div class="grid"><div><label>日期</label><input type="date" id="gameDate"></div><div><label>時間</label><input type="time" id="gameTime"></div><div><label>地點</label><input id="venue"></div></div>
<div class="grid" style="margin-top:10px"><div><label>目標得分</label><input type="number" id="targetScore" min="1" value="30"></div><div><label>活動類型</label><select id="activityType" onchange="activityUI()"><option>獨自練球</option><option>單打無賭注</option><option>單打有賭注</option><option>多人追分</option><option>正式比賽</option></select></div></div>
<div id="practice" style="margin-top:10px"><label>練球模式</label><select id="practiceMode"><option>單一母球</option><option>白黃交錯</option><option>任意母球</option></select></div>
<div id="opponent" class="hidden" style="margin-top:10px"><label>對手姓名</label><input id="opponentName"></div><div id="stake" class="hidden" style="margin-top:10px"><label>賭注金額</label><input type="number" id="stakeAmount" min="0"></div><div id="competition" class="hidden" style="margin-top:10px"><label>比賽名稱</label><input id="competitionName"></div>
<div id="multi" class="hidden" style="margin-top:10px"><label>參與者姓名</label><input id="multiNames" placeholder="以逗號分隔" oninput="participantUI()"><div id="orders" class="participants"></div></div>
<button style="margin-top:14px" onclick="startGame()">開始本局並計時</button></section>
<section class="card live hidden" id="live"><h2>即時計分</h2><div class="metrics"><div class="metric"><div class="ml">目前得分</div><div class="mv" id="total">0</div></div><div class="metric"><div class="ml">杆數</div><div class="mv" id="shots">0</div></div><div class="metric"><div class="ml">得分率</div><div class="mv" id="avg">0.000</div></div><div class="metric"><div class="ml">花費時間</div><div class="mv" id="elapsed">00:00</div></div></div>
<div class="progress"><div class="bar" id="bar"></div></div><div class="caption" id="progressText">0 / 30</div><div class="caption" style="margin-top:18px">第 <span id="inn">1</span> 杆目前得分</div><div class="score" id="current">0</div>
<div class="big"><button onclick="adjust(1)">+1</button><button class="danger" onclick="adjust(-1)">−1</button></div><button class="commit" onclick="commitInn()">記錄本杆，進入下一杆</button><button class="gray" style="margin-top:10px" onclick="undo()">復原上一步</button><div id="reached" class="banner hidden">已達成目標得分！</div><div class="actions"><button onclick="finish()">完成並儲存本局</button><button class="danger" onclick="cancelGame()">取消本局</button></div></section>
<section class="card hidden" id="list"><h2>已記錄杆數</h2><div class="table"><table><thead><tr><th>Inn</th><th>得分</th></tr></thead><tbody id="tbody"></tbody></table></div></section>
</main><script src="js/common.js"></script><script>
let scores=[],cp=0,started=0,timer=0,stack=[],reachedAt=0;
function activityUI(){const t=activityType.value;practice.classList.toggle('hidden',t!=='獨自練球');opponent.classList.toggle('hidden',!['單打無賭注','單打有賭注','正式比賽'].includes(t));stake.classList.toggle('hidden',!['單打有賭注','多人追分'].includes(t));competition.classList.toggle('hidden',t!=='正式比賽');multi.classList.toggle('hidden',t!=='多人追分')}
function participantUI(){const ns=multiNames.value.split(/[,，、\n]/).map(x=>x.trim()).filter(Boolean);orders.innerHTML=ns.map((n,i)=>`<div class="participant"><input type="number" min="1" value="${i+1}" data-name="${n}"><div>${n}</div></div>`).join('')}
function meta(){const t=activityType.value;if(t==='獨自練球')return{practiceMode:practiceMode.value};if(t==='單打無賭注')return{opponentName:opponentName.value};if(t==='單打有賭注')return{opponentName:opponentName.value,stakeAmount:stakeAmount.value};if(t==='正式比賽')return{competitionName:competitionName.value,opponentName:opponentName.value};return{stakeAmount:stakeAmount.value,participants:[...orders.querySelectorAll('input')].map(x=>({name:x.dataset.name,order:Number(x.value)})).sort((a,b)=>a.order-b.order)}}
function startGame(){if(Number(targetScore.value)<1)return alert('請輸入目標得分');scores=[];cp=0;stack=[];reachedAt=0;started=Date.now();timer=setInterval(draw,1000);setup.classList.add('hidden');live.classList.remove('hidden');list.classList.remove('hidden');draw()}
function adjust(d){const old=cp;cp=Math.max(0,cp+d);if(old!==cp)stack.push({type:'point',old});draw()}
function commitInn(){scores.push({inn:scores.length+1,points:cp});stack.push({type:'commit'});cp=0;const s=stats(scores);if(!reachedAt&&s.totalPoints>=Number(targetScore.value)){reachedAt=Date.now();reached.classList.remove('hidden');if(confirm('已達成目標，是否完成本局？'))finish()}draw()}
function undo(){const a=stack.pop();if(!a)return alert('沒有可復原的操作');if(a.type==='point')cp=a.old;else{const last=scores.pop();cp=last?last.points:0;if(stats(scores).totalPoints<Number(targetScore.value)){reachedAt=0;reached.classList.add('hidden')}}draw()}
function seconds(){return Math.floor(((reachedAt||Date.now())-started)/1000)}
function draw(){const s=stats(scores),t=Number(targetScore.value)||0;total.textContent=s.totalPoints;shots.textContent=s.totalShots;avg.textContent=s.avg.toFixed(3);elapsed.textContent=duration(seconds());inn.textContent=scores.length+1;current.textContent=cp;progressText.textContent=`${s.totalPoints} / ${t}`;bar.style.width=`${t?Math.min(100,s.totalPoints/t*100):0}%`;tbody.innerHTML=scores.slice().reverse().map(x=>`<tr><td>${x.inn}</td><td>${x.points}</td></tr>`).join('')||'<tr><td colspan="2">尚未記錄</td></tr>'}
function record(){const s=stats(scores);return{id:Date.now(),date:gameDate.value,time:gameTime.value,venue:venue.value,activityType:activityType.value,activityMeta:meta(),targetScore:Number(targetScore.value),scores:[...scores],totalPoints:s.totalPoints,totalShots:s.totalShots,avg:s.avg,highRun:s.highRun,zeroShots:s.zeroShots,zeroRate:s.zeroRate,durationSeconds:seconds(),targetCompleted:s.totalPoints>=Number(targetScore.value),targetReachedSeconds:reachedAt?Math.floor((reachedAt-started)/1000):null}}
function finish(){if(!scores.length)return alert('請至少記錄一杆');clearInterval(timer);const r=record();if(!confirm(`完成本局？\n得分 ${r.totalPoints}/${r.targetScore}\n杆數 ${r.totalShots}\nAVG ${r.avg.toFixed(3)}\n時間 ${duration(r.durationSeconds)}`)){timer=setInterval(draw,1000);return}const h=loadHistory();h.push(r);saveHistory(h);location.href='history.html'}
function cancelGame(){if(confirm('確定取消本局？'))location.reload()}window.addEventListener('DOMContentLoaded',()=>{nowFields();activityUI()});
</script></body></html>
