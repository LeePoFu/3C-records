<!doctype html><html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="stylesheet" href="css/style.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><title>設定</title></head><body>
<header><div class="wrap"><h1>設定</h1><div class="sub">一般偏好、資料備份與版本資訊</div></div></header>
<nav><div class="nav"><a href="index.html">首頁</a><a href="game.html">新局</a><a href="history.html">歷史</a><a href="analytics.html">分析</a><a class="active" href="settings.html">設定</a></div></nav>
<main>
<section class="card"><h2>一般</h2><div class="grid"><div><label>預設目標分數</label><input type="number" id="defaultTarget" min="1" value="30"></div><div><label>常用球場</label><input id="defaultVenue"></div></div><button class="light" style="margin-top:14px" onclick="savePreferences()">儲存一般設定</button></section>
<section class="card"><h2>資料</h2><div class="actions"><button onclick="exportJSON()">匯出 JSON 備份</button><button class="light" onclick="importFile.click()">匯入 JSON 備份</button><button class="light" onclick="exportWorkbook('3C-training-history.xlsx',buildHistoryWorkbookData(loadHistory()))">匯出 Excel</button></div><input type="file" id="importFile" class="hidden" accept=".json" onchange="importJSON(event)"></section>
<section class="card"><h2>資料狀態</h2><div class="metrics"><div class="metric"><div class="ml">目前局數</div><div class="mv" id="gameCount">0</div></div><div class="metric"><div class="ml">資料大小</div><div class="mv" id="dataSize">0 KB</div></div></div></section>
<section class="card"><h2>系統</h2><p class="note">版本：v4.0 Professional<br>資料鍵：threeCushionTrainingLog_v1</p></section>
</main><script src="js/common.js"></script><script>
const PREF_KEY='threeCushionPreferences_v1';function prefs(){try{return JSON.parse(localStorage.getItem(PREF_KEY))||{}}catch{return{}}}
function savePreferences(){localStorage.setItem(PREF_KEY,JSON.stringify({defaultTarget:Number(defaultTarget.value)||30,defaultVenue:defaultVenue.value.trim()}));alert('設定已儲存')}
function refresh(){const raw=localStorage.getItem(STORAGE_KEY)||'[]';gameCount.textContent=loadHistory().length;dataSize.textContent=(new Blob([raw]).size/1024).toFixed(1)+' KB'}
function exportJSON(){const b=new Blob([JSON.stringify({version:'4.0',history:loadHistory(),preferences:prefs()},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='3c-professional-backup.json';a.click()}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result),h=Array.isArray(o)?o:o.history;if(!Array.isArray(h))throw 0;if(confirm(`將覆蓋為 ${h.length} 筆紀錄，確定嗎？`)){saveHistory(h);if(o.preferences)localStorage.setItem(PREF_KEY,JSON.stringify(o.preferences));refresh();alert('匯入完成')}}catch{alert('JSON 格式錯誤')}};r.readAsText(f)}
const p=prefs();defaultTarget.value=p.defaultTarget||30;defaultVenue.value=p.defaultVenue||'';refresh();
</script></body></html>
