<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="css/style.css"><title>設定</title></head><body><header><div class="wrap"><h1>設定與備份</h1></div></header><nav><div class="nav"><a href="index.html">首頁</a><a href="game.html">新局</a><a href="history.html">歷史</a><a href="analytics.html">分析</a><a class="active" href="settings.html">設定</a></div></nav><main><section class="card"><button onclick="exp()">匯出 JSON 備份</button><input type="file" id="f" accept=".json" style="margin-top:10px" onchange="imp(event)"></section></main><script src="js/common.js"></script><script>function exp(){const b=new Blob([JSON.stringify({history:loadHistory()},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='3c-backup.json';a.click()}function imp(e){const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result),h=Array.isArray(o)?o:o.history;if(!Array.isArray(h))throw 0;if(confirm(`覆蓋為 ${h.length} 筆紀錄？`)){saveHistory(h);alert('完成')}}catch{alert('格式錯誤')}};r.readAsText(e.target.files[0])}</script></body></html>
