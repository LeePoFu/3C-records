<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>統計分析｜3CTS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f766e" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header><div class="header-inner"><h1>統計分析</h1><div class="subtitle">AVG 趨勢、High Run、空杆率與得分分布</div></div></header>
  <nav><div class="nav-inner">
    <a href="index.html">首頁</a><a href="game.html">新局</a><a href="history.html">歷史</a><a class="active" href="analytics.html">分析</a><a href="settings.html">設定</a>
  </div></nav>
  <main>
    <section class="card">
      <h2>核心指標</h2>
      <div class="metric-grid">
        <div class="metric"><div class="metric-label">總 AVG</div><div class="metric-value" id="avg">0.000</div></div>
        <div class="metric"><div class="metric-label">最近 30 局 AVG</div><div class="metric-value" id="recent30">0.000</div></div>
        <div class="metric"><div class="metric-label">High Run</div><div class="metric-value" id="highRun">0</div></div>
        <div class="metric"><div class="metric-label">空杆率</div><div class="metric-value" id="zeroRate">0.0%</div></div>
      </div>
    </section>

    <section class="card">
      <h2>AVG 趨勢</h2>
      <div class="chart-box"><canvas id="avgChart"></canvas></div>
    </section>

    <section class="card">
      <h2>得分分布</h2>
      <div id="distribution"></div>
    </section>

    <section class="card">
      <h2>地點分析</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>地點</th><th>局數</th><th>總得分</th><th>杆數</th><th>AVG</th></tr></thead>
          <tbody id="venueTable"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="js/common.js"></script>
  <script>
    const history = loadHistory();
    const stats = calculateHistoryStats(history);
    document.getElementById("avg").textContent = stats.avg.toFixed(3);
    document.getElementById("recent30").textContent = stats.recent30Avg.toFixed(3);
    document.getElementById("highRun").textContent = stats.highRun;
    document.getElementById("zeroRate").textContent = (stats.zeroRate * 100).toFixed(1) + "%";

    new Chart(document.getElementById("avgChart"), {
      type: "line",
      data: {
        labels: history.map((_, i) => String(i + 1)),
        datasets: [{ label: "單局 AVG", data: history.map(g => Number(g.avg || 0)), tension: 0.25 }]
      },
      options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
    });

    const counts = { "0":0, "1":0, "2":0, "3":0, "4+":0 };
    history.forEach(g => (g.scores || []).forEach(s => {
      const p = Number(s.points);
      if (p === 0) counts["0"]++;
      else if (p === 1) counts["1"]++;
      else if (p === 2) counts["2"]++;
      else if (p === 3) counts["3"]++;
      else if (p >= 4) counts["4+"]++;
    }));
    const maxCount = Math.max(...Object.values(counts), 1);
    document.getElementById("distribution").innerHTML = Object.entries(counts).map(([label, count]) => `
      <div class="bar-row"><div>${label}分</div><div class="bar-track"><div class="bar-fill" style="width:${count/maxCount*100}%"></div></div><div>${count}</div></div>
    `).join("");

    const venueMap = {};
    history.forEach(g => {
      const venue = g.venue || "未填";
      if (!venueMap[venue]) venueMap[venue] = { games:0, points:0, shots:0 };
      venueMap[venue].games++;
      venueMap[venue].points += Number(g.totalPoints || 0);
      venueMap[venue].shots += Number(g.totalShots || 0);
    });
    const venueRows = Object.entries(venueMap)
      .sort((a,b) => b[1].games - a[1].games)
      .map(([venue, v]) => `<tr><td>${escapeHTML(venue)}</td><td>${v.games}</td><td>${v.points}</td><td>${v.shots}</td><td>${v.shots ? (v.points/v.shots).toFixed(3) : "0.000"}</td></tr>`)
      .join("");
    document.getElementById("venueTable").innerHTML = venueRows || '<tr><td colspan="5">尚無資料</td></tr>';
  </script>
</body>
</html>
