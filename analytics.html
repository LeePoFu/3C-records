<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="css/style.css"><title>分析</title></head><body><header><div class="wrap"><h1>統計分析</h1></div></header><nav><div class="nav"><a href="index.html">首頁</a><a href="game.html">新局</a><a href="history.html">歷史</a><a class="active" href="analytics.html">分析</a><a href="settings.html">設定</a></div></nav><main><section class="card"><h2>目前版本已記錄</h2><div class="metrics"><div class="metric"><div class="ml">總局數</div><div class="mv" id="g">0</div></div><div class="metric"><div class="ml">達標局數</div><div class="mv" id="c">0</div></div><div class="metric"><div class="ml">平均時間</div><div class="mv" id="d">00:00</div></div><div class="metric"><div class="ml">最佳 AVG</div><div class="mv" id="a">0.000</div></div></div></section></main><script src="js/common.js"></script><script>const x=loadHistory(),t=x.filter(v=>v.durationSeconds!=null);g.textContent=x.length;c.textContent=x.filter(v=>v.targetCompleted).length;d.textContent=duration(t.length?t.reduce((s,v)=>s+v.durationSeconds,0)/t.length:0);a.textContent=x.length?Math.max(...x.map(v=>Number(v.avg||0))).toFixed(3):'0.000'</script></body></html>
